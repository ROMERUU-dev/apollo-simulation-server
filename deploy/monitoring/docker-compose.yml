services:
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:dd4bced05dfaddf23a7ec50f87334993a4149f7fcfbf58456d1c8bafce91cd13
    container_name: cimasim-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=2GB
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - cimasim-prometheus-data:/prometheus
    networks: [cimasim-monitoring-net]
    user: "65534:65534"
    read_only: true
    tmpfs: [/tmp:size=32m,noexec,nosuid,nodev]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    cpus: 1.0
    mem_limit: 768m
    memswap_limit: 768m
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, --spider, -q, http://127.0.0.1:9090/-/ready]
      interval: 30s
      timeout: 5s
      retries: 5

  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:fbd8062b4529e166e902bd62cd93de2f48b36d50af942620d419657265bc20b1
    container_name: cimasim-node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+|host)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|overlay|proc|pstore|securityfs|sysfs|tracefs)$$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    networks: [cimasim-monitoring-net]
    read_only: true
    tmpfs: [/tmp:size=16m,noexec,nosuid,nodev]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 64
    cpus: 0.25
    mem_limit: 192m
    memswap_limit: 192m
    restart: unless-stopped

  spool-exporter:
    build:
      context: ../..
      dockerfile: monitoring/spool_exporter/Dockerfile
    image: cimasim-spool-exporter:${CIMASIM_MONITORING_IMAGE_TAG:-dev}
    container_name: cimasim-spool-exporter
    user: "10004:10004"
    group_add: ["10003"]
    volumes: [cimasim-job-spool:/spool:ro]
    networks: [cimasim-monitoring-net]
    read_only: true
    tmpfs: [/tmp:size=16m,noexec,nosuid,nodev]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 64
    cpus: 0.20
    mem_limit: 128m
    memswap_limit: 128m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0@sha256:6ea068891652aa6a65ca9065c26b89de939653803c836426970305c11fd00534
    container_name: cimasim-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
    secrets: [grafana_admin_password]
    ports: ["127.0.0.1:3000:3000"]
    volumes:
      - cimasim-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [cimasim-monitoring-net]
    read_only: true
    tmpfs: [/tmp:size=64m,noexec,nosuid,nodev]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 128
    cpus: 0.75
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped

networks:
  cimasim-monitoring-net:
    name: cimasim-monitoring-net
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.240.0/24

volumes:
  cimasim-prometheus-data:
    name: cimasim-prometheus-data
  cimasim-grafana-data:
    name: cimasim-grafana-data
  cimasim-job-spool:
    external: true
    name: cimasim-job-spool

secrets:
  grafana_admin_password:
    file: ${CIMASIM_GRAFANA_ADMIN_PASSWORD_FILE:-/home/romeruu/.config/cimasim/grafana-admin-password.txt}
