services:
  api:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    image: cimasim-backend-api:${CIMASIM_BACKEND_IMAGE_TAG:-dev}
    container_name: cimasim-backend-api
    env_file:
      - ${CIMASIM_BACKEND_ENV_FILE:-/home/romeruu/.config/cimasim/backend.env}
    environment:
      CIMASIM_ALLOWED_EMAIL_DOMAINS: '["uabc.edu.mx"]'
      CIMASIM_JOBS_ENABLED: "true"
      CIMASIM_JOB_SPOOL_ROOT: /spool
      CIMASIM_JOB_TIMEOUT_SECONDS: "30"
      CIMASIM_JOB_ACTIVE_PER_USER_LIMIT: "2"
      CIMASIM_JOB_ACTIVE_GLOBAL_LIMIT: "20"
      CIMASIM_JOB_LIST_LIMIT: "100"
      CIMASIM_ADMIN_EMAIL_ALLOWLIST_FILE: /run/secrets/cimasim-admin-emails
      CIMASIM_PROMETHEUS_URL: http://prometheus:9090
      CIMASIM_METRICS_ALLOWED_CIDR: 172.31.240.0/24
      CIMASIM_CUSTOM_NETLISTS_ENABLED: "false"
      CIMASIM_ALLOW_LEGACY_RC_SUBMISSION: "false"
      CIMASIM_CUSTOM_JOB_SPOOL_ROOT: /custom-spool
    ports:
      - "127.0.0.1:8089:8080"
    networks:
      cimasim-backend-net: {}
      cimasim-edge-net:
        aliases:
          - cimasim-api
      cimasim-monitoring-net:
        aliases:
          - cimasim-api-monitoring
    user: "10001:10001"
    group_add:
      - "10003"
      - "${CIMASIM_CUSTOM_SPOOL_GID:?set CIMASIM_CUSTOM_SPOOL_GID}"
    volumes:
      - cimasim-job-spool:/spool
      - ${CIMASIM_CUSTOM_SPOOL_ROOT:-/var/lib/cimasim-custom-spool}:/custom-spool
      - ${CIMASIM_ADMIN_EMAIL_ALLOWLIST_FILE:-/home/romeruu/.config/cimasim/admin-emails.txt}:/run/secrets/cimasim-admin-emails:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    init: true
    pids_limit: 128
    cpus: 2.0
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8080/readyz', timeout=2); sys.exit(0 if r.status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  cimasim-backend-net:
    name: cimasim-backend-net
    driver: bridge
  cimasim-edge-net:
    external: true
    name: cimasim-edge-net
  cimasim-monitoring-net:
    external: true
    name: cimasim-monitoring-net

volumes:
  cimasim-job-spool:
    external: true
    name: cimasim-job-spool
