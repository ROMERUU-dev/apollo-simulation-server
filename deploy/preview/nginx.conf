worker_processes auto;

pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  sendfile on;
  keepalive_timeout 65;

  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 2s;

  map $request_method $api_method_allowed {
    default 0;
    GET 1;
    HEAD 1;
  }

  map $request_method $jobs_collection_method_allowed {
    default 0;
    GET 1;
    HEAD 1;
    POST 1;
  }

  map $request_method $jobs_item_method_allowed {
    default 0;
    GET 1;
    HEAD 1;
  }

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location = /api/health {
      if ($api_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_intercept_errors off;
    }

    location = /api/me {
      if ($api_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_intercept_errors off;
    }

    location = /api/admin/monitoring/summary {
      if ($api_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 3s;
      proxy_read_timeout 3s;
      proxy_intercept_errors off;
    }

    location = /api/admin/monitoring/history {
      if ($api_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 3s;
      proxy_read_timeout 3s;
      proxy_intercept_errors off;
    }

    location = /api/jobs {
      if ($jobs_collection_method_allowed = 0) {
        return 405;
      }

      client_max_body_size 72k;
      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_request_buffering on;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Idempotency-Key $http_idempotency_key;
      proxy_set_header Content-Type $http_content_type;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_intercept_errors off;
    }

    location = /api/jobs/preflight {
      if ($request_method != POST) {
        return 405;
      }

      client_max_body_size 72k;
      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_request_buffering on;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Content-Type $http_content_type;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_intercept_errors off;
    }

    location ~ "^/api/jobs/job_[0-9a-f]{32}$" {
      if ($jobs_item_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_intercept_errors off;
    }

    location ~ "^/api/jobs/job_[0-9a-f]{32}/artifacts$" {
      if ($jobs_item_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_intercept_errors off;
    }

    location ~ "^/api/jobs/job_[0-9a-f]{32}/artifacts/waveform[.]csv$" {
      if ($jobs_item_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header Accept-Encoding "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
      proxy_intercept_errors off;
    }

    location ~ "^/api/jobs/job_[0-9a-f]{32}/artifacts/results[.]csv$" {
      if ($jobs_item_method_allowed = 0) {
        return 405;
      }

      set $cimasim_api http://cimasim-api:8080;
      proxy_pass $cimasim_api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host cimasim-api;
      proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
      proxy_set_header Cookie "";
      proxy_set_header Authorization "";
      proxy_set_header Accept-Encoding "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
      proxy_intercept_errors off;
    }

    location /api/ {
      return 404;
    }

    location = /healthz {
      return 404;
    }

    location = /readyz {
      return 404;
    }

    location = /docs {
      return 404;
    }

    location = /redoc {
      return 404;
    }

    location = /openapi.json {
      return 404;
    }

    location = /metrics {
      return 404;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
