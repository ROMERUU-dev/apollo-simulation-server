services:
  frontend:
    build:
      context: ../..
      dockerfile: deploy/preview/Dockerfile
    image: cimasim-preview-frontend:${CIMASIM_PREVIEW_IMAGE_TAG:-a7a5c2e}
    container_name: cimasim-preview-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - cimasim-preview-internal
      - cimasim-edge-net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "0.50"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -qx ok"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  cimasim-preview-internal:
    name: cimasim-preview-internal
    driver: bridge
  cimasim-edge-net:
    external: true
    name: cimasim-edge-net
