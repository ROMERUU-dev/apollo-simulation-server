services:
  spool-init:
    image: busybox:1.36
    command: ["sh", "-c", "mkdir -p /spool/queued /spool/claimed /spool/jobs /spool/failed && chown -R 0:10003 /spool && chmod -R u=rwX,g=rwX,o= /spool && chmod 2770 /spool /spool/queued /spool/claimed /spool/jobs /spool/failed"]
    volumes:
      - cimasim-job-spool-test:/spool
    network_mode: none

  backend-test:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    image: cimasim-backend-job-spool-test:${CIMASIM_JOB_SPOOL_TEST_TAG:-dev}
    user: "10001:10001"
    group_add:
      - "10003"
    environment:
      CIMASIM_ENV: test
      CIMASIM_CF_TEAM_DOMAIN: https://cimasim.cloudflareaccess.com
      CIMASIM_CF_AUD: test-audience
      CIMASIM_ALLOWED_EMAIL_DOMAINS: '["uabc.edu.mx"]'
      CIMASIM_JOBS_ENABLED: "true"
      CIMASIM_JOB_SPOOL_ROOT: /spool
    volumes:
      - cimasim-job-spool-test:/spool
    expose:
      - "8080"
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    cpus: "1.0"
    mem_limit: 512m
    memswap_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "256k"
        max-file: "1"

  worker-test:
    build:
      context: ../..
      dockerfile: deploy/worker/Dockerfile
      additional_contexts:
        xyce: ${CIMASIM_XYCE_PREFIX:?Set CIMASIM_XYCE_PREFIX to the local Xyce prefix}
    image: cimasim-xyce-job-spool-test:${CIMASIM_JOB_SPOOL_TEST_TAG:-dev}
    entrypoint: ["python3", "-m", "cimasim_worker.daemon"]
    command: ["--spool-root", "/spool", "--once"]
    user: "10002:10002"
    group_add:
      - "10003"
    init: true
    network_mode: none
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    cpus: "2.0"
    mem_limit: 2g
    memswap_limit: 2g
    tmpfs:
      - /tmp:rw,nosuid,nodev,mode=1777,size=256m
    volumes:
      - cimasim-job-spool-test:/spool
    logging:
      driver: json-file
      options:
        max-size: "256k"
        max-file: "1"

volumes:
  cimasim-job-spool-test:
    name: cimasim-job-spool-test
