global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs: [{targets: ["prometheus:9090"]}]
  - job_name: node
    static_configs: [{targets: ["node-exporter:9100"]}]
  - job_name: backend
    metrics_path: /metrics
    static_configs: [{targets: ["cimasim-api-monitoring:8080"]}]
  - job_name: spool
    static_configs: [{targets: ["spool-exporter:9201"]}]
