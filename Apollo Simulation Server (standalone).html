  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ht: 600;\n  font-display: swap;\n  src: url(\"a3d58d82-eae0-4353-acae-b5ff38f1aa9f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f2f2f3;\n  --color-surface: #e9e9ea;\n  --color-text: #1d1f20;\n  --color-accent: #5980a6;\n  --color-accent-2: #728fab;\n  --color-divider: color-mix(in srgb, #1d1f20 16%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f5f5f8;\n  --color-neutral-200: #e7e7ea;\n  --color-neutral-300: #d4d4d7;\n  --color-neutral-400: #b7b7ba;\n  --color-neutral-500: #98989b;\n  --color-neutral-600: #7a7a7d;\n  --color-neutral-700: #5d5d60;\n  --color-neutral-800: #424244;\n  --color-neutral-900: #2b2b2d;\n\n  --color-accent-100: #eef6ff;\n  --color-accent-200: #d6ebff;\n  --color-accent-300: #b5d9fd;\n  --color-accent-400: #94bce3;\n  --color-accent-500: #749dc4;\n  --color-accent-600: #597ea3;\n  --color-accent-700: #416180;\n  --color-accent-800: #2c455d;\n  --color-accent-900: #1d2d3d;\n\n  --color-accent-2-100: #eef6ff;\n  --color-accent-2-200: #d6ebff;\n  --color-accent-2-300: #bdd8f2;\n  --color-accent-2-400: #9ebbd8;\n  --color-accent-2-500: #7e9cb8;\n  --color-accent-2-600: #627d98;\n  --color-accent-2-700: #486077;\n  --color-accent-2-800: #314457;\n  --color-accent-2-900: #1f2d3a;\n\n  --font-heading: \"Barlow Condensed\", system-ui, sans-serif;\n  --font-heading-weight: 600;\n  --font-body: \"Barlow\", system-ui, sans-serif;\n\n  --space-1: 3.4px;\n  --space-2: 6.8px;\n  --space-3: 10.2px;\n  --space-4: 13.6px;\n  --space-6: 20.4px;\n  --space-8: 27.2px;\n\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 7px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2b2b2d 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2b2b2d 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2b2b2d 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.blueprint {\n  position: relative;\n  border: 1px solid var(--color-divider);\n  border-radius: 0;\n}\n/* The overlay image treatments (halftone, duotone) clip their overlay\n   (overflow:hidden); a blueprint wrapper draws its registration marks\n   outside the box, so when both classes share a wrapper the frame must\n   win. */\n.blueprint.halftone, .blueprint.plate, .blueprint.duotone { overflow: visible; }\n.blueprint > .corner {\n  position: absolute; width: 11px; height: 11px;\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.blueprint > .corner::before, .blueprint > .corner::after {\n  content: \"\"; position: absolute; background: currentColor;\n}\n.blueprint > .corner::before { left: 5px; top: 0; width: 1px; height: 100%; }\n.blueprint > .corner::after  { top: 5px; left: 0; width: 100%; height: 1px; }\n.blueprint > .corner.tl { top: -6px; left: -6px; }\n.blueprint > .corner.tr { top: -6px; right: -6px; }\n.blueprint > .corner.bl { bottom: -6px; left: -6px; }\n.blueprint > .corner.br { bottom: -6px; right: -6px; }\n\n.duotone{position:relative;overflow:hidden}\n.duotone::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background:var(--color-accent);mix-blend-mode:color}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n/* — blueprint frame: components are wireframe objects (see .blueprint\n     and .corner above) — square, transparent, hairline-bordered — */\n.card, .btn, .input, .tag, .seg, .dialog { border-radius: 0; }\n.card, .dialog { background: transparent; border: 1px solid var(--color-divider); }\n.btn { border: 1p lor-accent-600)\"><\u002Fdiv><\u002Fdiv><div style=\"font-size:10.5px;opacity:.5;margin-top:3px;text-align:right\">{{ j.progressLabel }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\"><h2 style=\"font-size:17px;margin:0\">Proyectos recientes<\u002Fh2><a href=\"#\" sc-camel-on-click=\"{{ nav.projectsPrevent }}\" style=\"font-size:13px\">Ver todos →<\u002Fa><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <sc-for list=\"{{ home.projects }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <button type=\"button\" sc-camel-on-click=\"{{ p.open }}\" class=\"apl-card\" style=\"text-align:left;cursor:pointer;background:transparent;color:inherit;font-family:var(--font-body)\">\n              <div style=\"font-size:14px;font-weight:600;font-family:var(--font-heading)\">{{ p.name }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;opacity:.55;margin-top:4px\">Modificado {{ p.modified }} · {{ p.simCount }} simulaciones<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:26px\">\n      <h2 style=\"font-size:17px;margin:0 0 10px\">Simulaciones recientes<\u002Fh2>\n      <sc-raw-table class=\"table\"><sc-raw-thead><sc-raw-tr><sc-raw-th>Nombre<\u002Fsc-raw-th><sc-raw-th>Proyecto<\u002Fsc-raw-th><sc-raw-th>Simulador<\u002Fsc-raw-th><sc-raw-th>Estado<\u002Fsc-raw-th><sc-raw-th>Duración<\u002Fsc-raw-th><sc-raw-th>Finalizó<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n        <sc-raw-tbody>\n          <sc-for list=\"{{ home.recentRuns }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <sc-raw-tr><sc-raw-td>{{ r.name }}<\u002Fsc-raw-td><sc-raw-td class=\"text-muted\">{{ r.project }}<\u002Fsc-raw-td><sc-raw-td class=\"text-muted\">{{ r.simu dding-left:30px\" placeholder=\"Buscar proyectos…\" value=\"{{ projects.search }}\" sc-camel-on-change=\"{{ projects.onSearch }}\">\n      <\u002Fdiv>\n      <sc-raw-select class=\"input\" style=\"width:170px\" value=\"{{ projects.sort }}\" sc-camel-on-change=\"{{ projects.onSort }}\">\n        <option value=\"modified\">Ordenar: Modificado<\u002Foption>\n        <option value=\"name\">Ordenar: Nombre<\u002Foption>\n        <option value=\"sims\">Ordenar: Simulaciones<\u002Foption>\n      <\u002Fsc-raw-select>\n      <div class=\"seg\">\n        <label class=\"seg-opt\"><input type=\"radio\" name=\"pf\" sc-camel-on-change=\"{{ projects.setFilterActive }}\" checked=\"{{ projects.filterIsActive }}\">Activos<\u002Flabel>\n        <label class=\"seg-opt\"><input type=\"radio\" name=\"pf\" sc-camel-on-change=\"{{ projects.setFilterArchived }}\" checked=\"{{ projects.filterIsArchived }}\">Archivados<\u002Flabel>\n        <label class=\"seg-opt\"><input type=\"radio\" name=\"pf\" sc-camel-on-change=\"{{ projects.setFilterAll }}\" checked=\"{{ projects.filterIsAll }}\">Todos<\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ projects.hasResults }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"border:1px solid var(--color-divider)\">\n      <div style=\"display:grid;grid-template-columns:2.2fr 1fr .8fr 1fr 1.4fr;gap:10px;padding:9px 14px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;opacity:.55;border-bottom:1px solid var(--color-divider)\">\n        <span>Proyecto<\u002Fspan><span>Netlists / modelos<\u002Fspan><span>Simulaciones<\u002Fspan><span>Modificado<\u002Fspan><span><\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ projects.list }}\" as=\"p\" hint-placeholder-count=\"4\">\n        <div style=\"display:grid;grid-template-columns:2.2fr 1fr .8fr 1fr 1.4fr;gap:10px;align-items:center;padding:13px 14px;border-bottom:1px solid var(--color-divider)\">\n          <div style=\"min-width:0\">\n            <button type=\"button\" sc-camel-on-click=\"{{ p.open }}\" style=\"background:none;border:none;padding:0;cursor:pointer;font-family:var(--font-heading);font-weight:600;font-size:15px;color:var(--color-text);text-align:left;display:block\">{{ p.name }}<\u002Fbutton>\n            <div style=\"font-size:12px;opacity:.6;margin-top:2px;max-width:520px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ p.description }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;opacity:.75\">{{ p.fileCounts }}<\u002Fdiv>\n          <div style=\"font-size:13px;opacity:.75\">{{ p.simCount }}<\u002Fdiv>\n          <div style=\"font-size:13px;opacity:.6\">{{ p.modified }}<\u002Fdiv>\n          <div style=\"display:flex;gap:6px;justify-content:flex-end\">\n            <sc-if value=\"{{ p.archived }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ p.archivedTagStyle }}\">Archivado<\u002Fspan><\u002Fsc-if>\n            <button type=\"button\" class=\"btn btn-secondary\" sc-camel-on-click=\"{{ p.duplicate }}\" title=\"Duplicar\">Duplicar<\u002Fbutton>\n            <button type=\"button\" class=\"btn btn-secondary\" sc-camel-on-click=\"{{ p.toggleArchive }}\" title=\"Archivar\">{{ p.archiveLabel }}<\u002Fbutton>\n            <button type=\"button\" class=\"btn btn-secondary\" sc-camel-on-click=\"{{ p.remove }}\" title=\"Eliminar\" style=\"color:var(--status-bad)\">Eliminar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ projects.emptyState }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"border:1px dashed var(--color-divider);padding:60px 20px;text-align:center\">\n      <svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\" style=\"opacity:.4;margin:0 auto 14px\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n      <div style=\"font-family:var(--font-heading);font-size:17px;font-weight:600;margin-bottom:5px\">Sin resultados para «{{ projects.search }}»<\u002Fdiv>\n      <p style=\"margin:0 0 16px;font-size:13px;opacity:.6\">Prueba con otro término, o revisa el filtro activo.<\u002Fp>\n      <button type=\"button\" class=\"btn btn-secondary\" sc-camel-on-click=\"{{ projects.clearSearch }}\">Limpiar búsqueda<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ projects.showCreateDialog }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"dialog-backdrop\" style=\"position:fixed\">\n      <div class=\"dialog blueprint\"><i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <div class=\"dialog-title\">Crear proyecto<\u002Fdiv>\n        <div class=\"field\"><label>Nombre del proyecto<\u002Flabel><input class=\"input\" placeholder=\"p. ej. Amplificador clase AB\" sc-camel-auto-focus=\"{{ true }}\"><\u002Fdiv>\n        <div class=\"field\"><label>Descripción (opcional)<\u002Flabel><textarea class=\"input\" rows=\"3\" placeholder=\"Objetivo del proyecto, notas de contexto…\"><\u002Ftextarea><\u002Fdiv>\n        <div class=\"dialog-actions\">\n          <button type=\"button\" class=\"btn btn-secondary blueprint\" sc-camel-on-click=\"{{ projects.closeCreate }}\"><i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>Cancelar<\u002Fbutton>\n          <button type=\"button\" class=\"btn btn-primary blueprint\" sc-camel-on-click=\"{{ projects.confirmCreate }}\"><i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>Crear proyecto<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ projects.showDeleteDialog }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"dialog-backdrop\" st n              <sc-for list=\"{{ wiz.previewLines }}\" as=\"ln\" hint-placeholder-count=\"14\">\n                <div style=\"{{ ln.style }};white-space:pre\"><span style=\"opacity:.35;display:inline-block;width:26px\">{{ ln.n }}<\u002Fspan>{{ ln.text }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ wiz.syntaxWarning }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"apl-card\" style=\"margin-top:14px;border-color:var(--status-warn);background:var(--status-warn-bg)\">\n        <div style=\"display:flex;gap:10px;align-items:flex-start\">\n          <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--status-warn)\" stroke-width=\"1.7\" style=\"flex:none;margin-top:1px\"><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L14.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><\u002Fsvg>\n          <div><div style=\"font-weight:600;font-size:13.5px\">Posible error de sintaxis en la línea {{ wiz.syntaxWarningLine }}<\u002Fdiv><div style=\"font-size:12.5px;opacity:.75;margin-top:2px\">{{ wiz.syntaxWarningMsg }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ wiz.step2 }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <h2 style=\"font-size:17px;margin:0 0 4px\">Archivos asociados<\u002Fh2>\n      <p style=\"margin:0 0 16px;font-size:13px;opacity:.6\">Adjunta .lib, .mod, .model, .inc, subcircuitos o archivos de datos referenciados por la netlist.<\u002Fp>\n      <div style=\"border:2px dashed var(--color-divider);padding:26px;text-align:center;margin-bottom:18px\">\n        <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" style=\"opacity:.45;margin:0 auto 8px\"><path d=\"M21 15v4a2 2 0 ).toFixed(1)+'s' };\n  });\n\n  allJobs = [\n    { id:'j1', name:'Barrido MOSFET NMOS — Id-Vds', project:'Barrido MOSFET NMOS', simulator:'Xyce', status:'running', progress:58, elapsed:'6m 42s', started:'hoy, 10:04', worker:'worker-02', cpu:'380%', totalRuns:540, doneRuns:320, failedRuns:8, runningRuns:32, pendingRuns:180 },\n    { id:'j2', name:'Filtro RC — respuesta en frecuencia', project:'Filtro RC pasa-bajos', simulator:'ngspice', status:'queued', progress:0, elapsed:'—', started:'en espera', worker:'—', cpu:'—', totalRuns:24, doneRuns:0, failedRuns:0, runningRuns:0, pendingRuns:24 },\n    { id:'j3', name:'Buck 12V→3.3V — lazo cerrado', project:'Convertidor buck 12V→3.3V', simulator:'Xyce', status:'running', progress:23, elapsed:'2m 05s', started:'hoy, 10:38', worker:'worker-05', cpu:'210%', totalRuns:60, doneRuns:13, failedRuns:0, runningRuns:16, pendingRuns:31 },\n    { id:'j4', name:'LM358 — barrido de ganancia', project:'Amplificador LM358', simulator:'ngspice', status:'queued', progress:0, elapsed:'—', started:'en espera', worker:'—', cpu:'—', totalRuns:15, doneRuns:0, failedRuns:0, runningRuns:0, pendingRuns:15 },\n    { id:'j5', name:'Id-Vds corrida #540', project:'Barrido MOSFET NMOS', simulator:'Xyce', status:'done', progress:100, elapsed:'4m 12s', started:'hoy, 09:02', worker:'worker-01', cpu:'0%', totalRuns:540, doneRuns:532, failedRuns:8, runningRuns:0, pendingRuns:0 },\n    { id:'j6', name:'Lazo de control — Bode', project:'Convertidor buck 12V→3.3V', simulator:'ngspice', status:'failed', progress:14, elapsed:'0m 09s', started:'hoy, 08:52', worker:'worker-04', cpu:'0%', totalRuns:20, doneRuns:2, failedRuns:1, runningRuns:0, pendingRuns:17 },\n    { id:'j7', name:'Respuesta transitoria', project:'Oscilador Colpitts', simulator:'ngspice', status:'warn', progress:100, elapsed:'1m 04s', started:'ayer, 22:40', worker:'worker-01', cpu:'0%', totalRuns:18, doneRuns:16, failedRuns:2, runningRuns:0, pendingRuns:0 },\n    { id:'j8', name:'Prueba de arranque', project:'Convertidor buck 12V→3.3V', simulator:'Xyce', status:'cancelled', progress:40, elapsed:'1m 51s', started:'ayer, 20:15', worker:'—', cpu:'0%', totalRuns:30, doneRuns:12, failedRuns:0, runningRuns:0, pendingRuns:18 },\n  ];\n\n  logLines = [\n    ['10:04:02','info','Xyce 7.8 iniciado — worker-02'],\n    ['10:04:02','info','Cargando netlist mosfet_sweep.cir'],\n    ['10:04:03','info','Resolviendo 540 combinaciones de parámetros'],\n    ['10:04:03','warn','No se encontró models/mosfet.lib — 96 corridas dependientes se marcarán como fallidas'],\n    ['10:04:04','info','Corrida 1/540 — VDD=3.0 TEMP=-40 RLOAD=1k'],\n    ['10:04:06','info','Corrida 1/540 completada en 1.8s'],\n    ['10:04:06','info','Corrida 2/540 — VDD=3.0 TEMP=-40 RLOAD=5k'],\n    ['10:05:40','error','Corrida 118/540 — VDD=3.15 TEMP=-5 RLOAD=1k: fallo de convergencia (GMIN stepping agotado)'],\n    ['10:05:41','info','Corrida 119/540 — VDD=3.15 TEMP=0 RLOAD=1k'],\n    ['10:07:12','info','Corrida 210/540 completada en 2.1s'],\n    ['10:08:44','warn','Corrida 266/540 — advertencia: punto de operación cerca del límite de precisión'],\n    ['10:09:58','info','320/540 corridas completadas · 8 fallidas · 32 en ejecución'],\n  ];\n\n  projectTabDefs = [\n    ['overview','Resumen'],['netlists','Netlists'],['models','Modelos'],['configs','Configuraciones'],['results','Resultados'],\n  ];\n\n  allProjects = [\n    { id:'p1', name:'Barrido MOSFET NMOS — caracterización Id-Vds', description:'Curvas Id-Vds paramétricas sobre un NMOS discreto, variando VGS y temperatura.', netlists:3, models:2, simCount:14, modified:'hace 12 min', modifiedTs:12, archived:false },\n    { id:'p2', name:'Convertidor buck 12V→3.3V — lazo de control', description:'Verificación de estabilidad del lazo de control y respuesta transitoria de carga.', netlists:2, models:4, simCount:7, modified:'hace 1 hora', modifiedTs:60, archived:false },\n    { id:'p3', name:'Amplificador LM358 — banda ancha', description:'Barrido de ganancia y anch
